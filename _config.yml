title: Stellar IBC Eureka
description: >-
  Trust-minimized IBC v2 (Eureka) for Stellar — on-chain light-client
  verification on Soroban, connecting Stellar to the entire IBC graph.

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 2..3

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
  - .github
