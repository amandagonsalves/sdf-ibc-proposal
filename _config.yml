title: Stellar IBC Eureka
description: >-
  Trust-minimized IBC v2 (Eureka) for Stellar — on-chain light-client
  verification on Soroban, connecting Stellar to the entire IBC graph.
url: https://amandagonsalves.github.io
baseurl: /stellar-ibc-proposal

theme: just-the-docs

color_scheme: dark

mermaid:
  version: "10.9.1"

search_enabled: true
search:
  heading_level: 3
  previews: 3

heading_anchors: true

aux_links:
  Cardano Foundation IBC: https://github.com/cardano-foundation/cardano-ibc-incubator
  IBC Protocol: https://ibc-protocol.org/

nav_external_links:
  - title: IBC Protocol standards
    url: https://ibc-protocol.org/

footer_content: >-
  Stellar IBC Eureka — public project documentation.
  Licensed under the Apache License 2.0.

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Status
    color: yellow

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
