name: gateway ci

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/gateway/**"
      - "crates/core/**"
      - "crates/integration-tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/gateway-ci.yml"
  push:
    branches: [main]
    paths:
      - "crates/gateway/**"
      - "crates/core/**"
      - "crates/integration-tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/gateway-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gateway-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@1.91.1

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-crates-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-crates-

      - name: install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: run gateway integration tests
        run: cargo test -p integration-tests --locked
